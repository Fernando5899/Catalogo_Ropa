<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/producto.css">
    <title>Detalle del Producto</title>
</head>
<body>
    <header class="cabezera">
        <a href="index.html" class="boton-regresar">← Regresar a la Tienda</a>
    </header>

    <div class="contenedor-producto">

        <div class="galeria-imagen">
        </div>

        <div class="imagen-principal-contenedor" onclick="abrirModal()">
            <img id="imagen-principal" src="" alt="Cargando imagen...">
        </div>

        <div class="info-producto">
            <h1 class="titulo-producto">Cargando producto...</h1>
            <h2 class="precio-producto">--</h2>
            <p class="descripcion">Por favor espera un momento.</p>
        </div>

        <div id="miModal" class="modal">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <span class="boton-anterior" onclick="navegarModal(-1)">&#10094;</span>
            <img class="modal-contenido" id="img-modal">
            <span class="boton-siguiente" onclick="navegarModal(1)">&#10095;</span>
        </div>
    </div>

    <script src="javascript/producto.js"></script>
</body>
</html>
